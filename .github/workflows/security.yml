name: Security Scan (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name to build and scan (ex: oli-gateway)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile (relative to repo root)"
        required: false
        type: string
        default: "Dockerfile"
      build-context:
        description: "Docker build context directory"
        required: false
        type: string
        default: "."
      gitleaks-fetch-depth:
        description: "History depth for gitleaks scan (0 = full)"
        required: false
        type: number
        default: 0

# Least-privilege default for the workflow. Consumers can grant more
# at the caller site (e.g. pull-requests: write if they want gitleaks
# to post PR annotations). gitleaks-action@v2 only requires contents:read.
permissions:
  contents: read

jobs:
  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "${{ inputs.image-name }}:scan" \
            "${{ inputs.build-context }}"

      # Policy (CI layer): HIGH+CRITICAL with fix available → FAIL
      - name: Trivy scan — HIGH/CRITICAL with fix (fail)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ inputs.image-name }}:scan"
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      # Policy (CI layer): HIGH+CRITICAL without fix → WARN (exit 0)
      - name: Trivy scan — HIGH/CRITICAL without fix (warn)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ inputs.image-name }}:scan"
          format: table
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: false

  gitleaks:
    name: Gitleaks History Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.gitleaks-fetch-depth }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
